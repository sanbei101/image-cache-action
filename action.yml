name: 'Docker Image Cache'
description: 'Cache downloaded Docker images to speed up workflows'
author: 'sanbei101'

branding:
  icon: 'archive'
  color: 'blue'
inputs:
  images:
    description: '需要缓存的 Docker 镜像列表,多行输入,每行一个镜像'
    required: true
  github_token:
    description: 'GITHUB_TOKEN for ghcr.io authentication'
    required: false
    default: ${{ github.token }}

runs:
  using: 'node24'
  main: 'dist/main.js'
  post: 'dist/post.js'