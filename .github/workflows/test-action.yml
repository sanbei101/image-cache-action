name: Test Image Cache

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Build action
        run: pnpm install && pnpm build

      - name: Cache ubuntu:24.04
        uses: ./
        with:
          images: |
            ubuntu:24.04
            postgres:18

      - name: pull image
        run: |
          docker pull ubuntu:24.04
          docker pull postgres:18
    