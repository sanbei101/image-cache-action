name: Test Image Cache

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build action
        run: pnpm install && pnpm build

      - name: Cache ubuntu:24.04
        uses: ./
        with:
          images: |
            ubuntu:24.04
            postgres:18

      - name: pull image
        run: |
          docker pull ubuntu:24.04
          docker pull postgres:18
    